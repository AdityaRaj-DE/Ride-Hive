version: '3.8'

services:
  # Central database container
  mongodb:
    image: mongo:6.0
    container_name: ridehive_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ridehive_network

  # Auth Service
  auth-service:
    build:
      context: ./backend/auth_service
    container_name: ridehive_auth_service
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_auth
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - ADMIN_SERVICE_URL=http://admin-service:3009
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Rider Service
  rider-service:
    build:
      context: ./backend/rider_service
    container_name: ridehive_rider_service
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_rider
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Driver Service
  driver-service:
    build:
      context: ./backend/driver_service
    container_name: ridehive_driver_service
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_driver
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - ADMIN_SERVICE_URL=http://admin-service:3009
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Ride Service
  ride-service:
    build:
      context: ./backend/ride_service
    container_name: ridehive_ride_service
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_ride
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - RIDER_SERVICE_URL=http://rider-service:3002
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ADMIN_SERVICE_URL=http://admin-service:3009
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Payment Service
  payment-service:
    build:
      context: ./backend/payment_service
    container_name: ridehive_payment_service
    ports:
      - "3005:3005"
    environment:
      - PORT=3005
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_payment
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - DRIVER_SERVICE_URL=http://driver-service:3003
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Feedback Service
  feedback-service:
    build:
      context: ./backend/feedback_service
    container_name: ridehive_feedback_service
    ports:
      - "3006:3006"
    environment:
      - PORT=3006
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_feedback
      - MONGO_URI=mongodb://mongodb:27017/ridehive_feedback
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Notification Service
  notification-service:
    build:
      context: ./backend/notification_service
    container_name: ridehive_notification_service
    ports:
      - "3007:3007"
    environment:
      - PORT=3007
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_notification
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - ADMIN_SERVICE_URL=http://admin-service:3009
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Pool Service
  pool-service:
    build:
      context: ./backend/pool_service
    container_name: ridehive_pool_service
    ports:
      - "3008:3008"
    environment:
      - PORT=3008
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_pool
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - RIDER_SERVICE_URL=http://rider-service:3002
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - RIDE_SERVICE_URL=http://ride-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - FEEDBACK_SERVICE_URL=http://feedback-service:3006
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - ADMIN_SERVICE_URL=http://admin-service:3009
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # Admin Service
  admin-service:
    build:
      context: ./backend/admin_service
    container_name: ridehive_admin_service
    ports:
      - "3009:3009"
    environment:
      - PORT=3009
      - MONGODB_URI=mongodb://mongodb:27017/ridehive_admin
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - RIDE_SERVICE_URL=http://ride-service:3004
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - FEEDBACK_SERVICE_URL=http://feedback-service:3006
    depends_on:
      - mongodb
    networks:
      - ridehive_network

  # API Gateway
  api-gateway:
    build:
      context: ./backend/api_gateway
    container_name: ridehive_api_gateway
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=goodkeymustchange
      - INTERNAL_SERVICE_KEY=super-secret-key-change-this
      - AUTH_SERVICE_URL=http://auth-service:3001
      - RIDER_SERVICE_URL=http://rider-service:3002
      - DRIVER_SERVICE_URL=http://driver-service:3003
      - RIDE_SERVICE_URL=http://ride-service:3004
      - PAYMENT_SERVICE_URL=http://payment-service:3005
      - NOTIFICATION_SERVICE_URL=http://notification-service:3007
      - POOL_SERVICE_URL=http://pool-service:3008
      - ADMIN_SERVICE_URL=http://admin-service:3009
      - FEEDBACK_SERVICE_URL=http://feedback-service:3006
      - CORS_ORIGINS=http://localhost:5173,https://localhost:5173,http://localhost:5174,https://localhost:5174,http://localhost:5175,https://localhost:5175
    depends_on:
      - auth-service
      - rider-service
      - driver-service
      - ride-service
      - payment-service
      - feedback-service
      - notification-service
      - pool-service
      - admin-service
    networks:
      - ridehive_network

  # Rider Frontend
  ride-frontend:
    build:
      context: ./ride-frontend
    container_name: ridehive_ride_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - api-gateway
    networks:
      - ridehive_network

  # Driver Frontend
  driver-frontend:
    build:
      context: ./driver-frontend
    container_name: ridehive_driver_frontend
    ports:
      - "5174:5174"
    environment:
      - VITE_API_URL=http://localhost:3000
      - VITE_SOCKET_URL=http://localhost:3004
    depends_on:
      - api-gateway
    networks:
      - ridehive_network

  # Admin Frontend
  admin-frontend:
    build:
      context: ./admin-frontend
    container_name: ridehive_admin_frontend
    ports:
      - "5175:5175"
    environment:
      - VITE_AUTH_SERVICE_URL=http://localhost:3000/auth
    depends_on:
      - api-gateway
    networks:
      - ridehive_network

networks:
  ridehive_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
